services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db       # override whatever is in .env — always use the container
      DB_PORT: 5432
      MCP_API_KEY: ${MCP_API_KEY:-}   # pass through from shell: export MCP_API_KEY=secret
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       fintechdb
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro   # runs 000→001→002 on first start
    ports:
      - "5433:5432"     # 5433 avoids conflict with a local postgres on 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fintechdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:        # persists data across container restarts
