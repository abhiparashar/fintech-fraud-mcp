services:
  app:
    build: .
    expose:
      - "8000"        # internal only — caddy proxies to it, internet can't reach it directly
    env_file:
      - .env
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"       # HTTP → Caddy redirects to HTTPS automatically
      - "443:443"     # HTTPS
      - "443:443/udp" # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # stores TLS certs (persisted across restarts)
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
